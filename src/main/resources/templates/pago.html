<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pago - EF Ciudad de Madrid</title>
    <link rel="stylesheet" th:href="@{/css/styles.css}">
    <script src="/js/app.js"></script>
    <script src="https://js.stripe.com/v3/"></script>
</head>
<body>

<nav class="navbar">
    <a class="navbar-brand" th:href="@{/}">
        <img th:src="@{/images/escudo.png}" alt="EFC Madrid" style="height:45px"/>
        E.F.C. Madrid 2018
    </a>
    <div class="navbar-links">
        <a th:href="@{/}">Inicio</a>
        <a href="#" onclick="irACuenta()">Mi cuenta</a>
    </div>
</nav>

<section class="form-section">
    <div class="form-card">
        <h1>Pago de equipación</h1>
        <p class="form-subtitle">Pago seguro con tarjeta</p>

        <div class="resumen-card">
            <div class="resumen-row">
                <span>Concepto</span>
                <span>Equipación temporada</span>
            </div>
            <div class="resumen-row resumen-total">
                <span>Total</span>
                <span class="pendiente">160€</span>
            </div>
        </div>

        <div id="error-msg" class="error-msg" style="display:none"></div>
        <div id="success-msg" class="success-msg" style="display:none"></div>

        <div class="form-group">
            <label>Datos de tarjeta</label>
            <div id="card-element" class="card-element"></div>
        </div>

        <button class="btn-primary btn-full" id="btn-pagar" onclick="pagar()">
            Pagar 160€
        </button>
    </div>
</section>

<footer class="footer">
    <p>© 2018 Escuela de Fútbol Ciudad de Madrid · La Elipa, Madrid</p>
</footer>

<script src="/js/pago.js"></script>
</body>
</html>
