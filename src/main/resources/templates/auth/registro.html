<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="#{title.auth.registro}">Registro - EF Ciudad de Madrid</title>
    <link rel="stylesheet" th:href="@{/css/styles.css}">
    <link rel="icon" th:href="@{/images/escudo.png}" type="image/png">
    <script src="/js/core/constants.js"></script>
    <script src="/js/app.js"></script>
</head>
<body>

<nav class="navbar">
    <a class="navbar-brand" th:href="@{/}">
        <img th:src="@{/images/escudo.png}" alt="EFC Madrid"/>
        <span th:text="#{brand.short}">E.F.C. Madrid 2018</span>
    </a>
    <div class="navbar-links">
        <a th:href="@{/}" th:text="#{nav.home}">Inicio</a>
        <a th:href="@{/registro}" th:text="#{nav.signup}">Inscribirse</a>
        <a href="#" data-action="ir-a-cuenta" th:text="#{nav.account}">Mi cuenta</a>
    </div>
</nav>

<section class="form-section">
    <div class="form-card">
        <h1>Crear cuenta</h1>
        <p class="form-subtitle">Regístrate como tutor para inscribir a tu hijo/a</p>

        <div id="error-msg" class="error-msg is-hidden"></div>
        <div id="success-msg" class="success-msg is-hidden"></div>

        <div class="form-group">
            <label for="nombre">Nombre</label>
            <input type="text" id="nombre" placeholder="Tu nombre"/>
        </div>
        <div class="form-group">
            <label for="apellidos">Apellidos</label>
            <input type="text" id="apellidos" placeholder="Tus apellidos"/>
        </div>
        <div class="form-group">
            <label for="email">Email</label>
            <input type="email" id="email" placeholder="tu@email.com"/>
        </div>
        <div class="form-group">
            <label for="telefono">Teléfono</label>
            <input type="tel" id="telefono" placeholder="600000000"/>
        </div>
        <div class="form-group">
            <label for="password">Contraseña</label>
            <div class="password-field">
                <input type="password" id="password" placeholder="Mínimo 6 caracteres"/>
                <button
                        type="button"
                        class="password-toggle-btn"
                        data-password-target="password"
                        data-label-show="Mostrar contraseña"
                        data-label-hide="Ocultar contraseña"
                        aria-label="Mostrar contraseña"
                        aria-pressed="false">👁</button>
            </div>
        </div>

        <button class="btn-primary btn-full" data-action="registro">Crear cuenta</button>

        <p class="form-footer">
            ¿Ya tienes cuenta? <a th:href="@{/login}">Inicia sesión</a>
        </p>
    </div>
</section>

<footer class="footer">
    <p th:text="#{footer.simple}">© 2018 Escuela de Futbol Ciudad de Madrid · La Elipa, Madrid</p>
</footer>

<script src="/js/registro.js"></script>
</body>
</html>
