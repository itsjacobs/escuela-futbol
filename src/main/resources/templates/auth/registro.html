<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro - EF Ciudad de Madrid</title>
    <link rel="stylesheet" th:href="@{/css/styles.css}">
    <script src="/js/app.js"></script>
</head>
<body>

<nav class="navbar">
    <div class="navbar-brand">⚽ EF Ciudad de Madrid</div>
    <div class="navbar-links">
        <a th:href="@{/}">Inicio</a>
        <a th:href="@{/registro}">Inscribirse</a>
        <a href="#" onclick="irACuenta()">Mi cuenta</a>
    </div>
</nav>

<section class="form-section">
    <div class="form-card">
        <h1>Crear cuenta</h1>
        <p class="form-subtitle">Regístrate como tutor para inscribir a tu hijo/a</p>

        <div id="error-msg" class="error-msg" style="display:none"></div>
        <div id="success-msg" class="success-msg" style="display:none"></div>

        <div class="form-group">
            <label>Nombre</label>
            <input type="text" id="nombre" placeholder="Tu nombre"/>
        </div>
        <div class="form-group">
            <label>Apellidos</label>
            <input type="text" id="apellidos" placeholder="Tus apellidos"/>
        </div>
        <div class="form-group">
            <label>Email</label>
            <input type="email" id="email" placeholder="tu@email.com"/>
        </div>
        <div class="form-group">
            <label>Teléfono</label>
            <input type="tel" id="telefono" placeholder="600000000"/>
        </div>
        <div class="form-group">
            <label>Contraseña</label>
            <input type="password" id="password" placeholder="Mínimo 6 caracteres"/>
        </div>

        <button class="btn-primary btn-full" onclick="registro()">Crear cuenta</button>

        <p class="form-footer">
            ¿Ya tienes cuenta? <a th:href="@{/login}">Inicia sesión</a>
        </p>
    </div>
</section>

<footer class="footer">
    <p>© 2018 Escuela de Fútbol Ciudad de Madrid · La Elipa, Madrid</p>
</footer>

<script src="/js/registro.js"></script>
</body>
</html>
