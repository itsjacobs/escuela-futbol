<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="#{title.auth.login}">Login - EF Ciudad de Madrid</title>
    <link rel="stylesheet" th:href="@{/css/styles.css}">
    <link rel="icon" th:href="@{/images/escudo.png}" type="image/png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@500;700;800;900&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
    <script src="/js/core/constants.js"></script>
    <script src="/js/app.js"></script>
</head>
<body>

<nav class="navbar">
    <a class="navbar-brand" th:href="@{/}">
        <img th:src="@{/images/escudo.png}" alt="EFC Madrid"/>
        <span class="navbar-brand-text" th:text="#{brand.short}">E.F.C. Madrid 2018</span>
    </a>
    <div class="navbar-links">
        <a th:href="@{/}" th:text="#{nav.home}">Inicio</a>
        <a th:href="@{/registro}" th:text="#{nav.signup}">Inscribirse</a>
        <a href="#" data-action="ir-a-cuenta" th:text="#{nav.account}">Mi cuenta</a>
    </div>
</nav>

<section class="form-section">
    <div class="form-card">
        <h1>Iniciar sesión</h1>
        <p class="form-subtitle">Accede a tu cuenta para ver el estado de pagos</p>

        <div id="error-msg" class="error-msg is-hidden"></div>

        <div class="form-group">
            <label for="email">Email</label>
            <input type="email" id="email" placeholder="tu@email.com"/>
        </div>
        <div class="form-group">
            <label for="password">Contraseña</label>
            <div class="password-field">
                <input type="password" id="password" placeholder="Tu contraseña"/>
                <button
                        type="button"
                        class="password-toggle-btn"
                        data-password-target="password"
                        data-label-show="Mostrar contraseña"
                        data-label-hide="Ocultar contraseña"
                        aria-label="Mostrar contraseña"
                        aria-pressed="false">
                    <svg class="eye-icon eye-open" viewBox="0 0 24 24" aria-hidden="true" focusable="false">
                        <path d="M2 12s3.5-6 10-6 10 6 10 6-3.5 6-10 6-10-6-10-6z" fill="none" stroke="currentColor" stroke-width="2"/>
                        <circle cx="12" cy="12" r="3" fill="none" stroke="currentColor" stroke-width="2"/>
                    </svg>
                    <svg class="eye-icon eye-closed is-hidden" viewBox="0 0 24 24" aria-hidden="true" focusable="false">
                        <path d="M2 12s3.5-6 10-6 10 6 10 6-3.5 6-10 6-10-6-10-6z" fill="none" stroke="currentColor" stroke-width="2"/>
                        <line x1="4" y1="20" x2="20" y2="4" stroke="currentColor" stroke-width="2"/>
                    </svg>
                </button>
            </div>
        </div>

        <button class="btn-primary btn-full" data-action="login">Entrar</button>

        <p class="form-footer">
            ¿No tienes cuenta? <a th:href="@{/registro}">Regístrate aquí</a>
        </p>
    </div>
</section>

<footer class="footer">
    <p th:text="#{footer.simple}">© 2018 Escuela de Futbol Ciudad de Madrid · La Elipa, Madrid</p>
    <a th:href="@{/privacidad}">Política de privacidad</a>
</footer>

<script src="/js/login.js"></script>
</body>
</html>
