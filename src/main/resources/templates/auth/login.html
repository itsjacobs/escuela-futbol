<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - EF Ciudad de Madrid</title>
    <link rel="stylesheet" th:href="@{/css/styles.css}">
    <script src="/js/app.js"></script>
</head>
<body>

<nav class="navbar">
    <div class="navbar-brand">⚽ EF Ciudad de Madrid</div>
    <div class="navbar-links">
        <a th:href="@{/}">Inicio</a>
        <a th:href="@{/registro}">Inscribirse</a>
        <a href="#" onclick="irACuenta()">Mi cuenta</a>
    </div>
</nav>

<section class="form-section">
    <div class="form-card">
        <h1>Iniciar sesión</h1>
        <p class="form-subtitle">Accede a tu cuenta para ver el estado de pagos</p>

        <div id="error-msg" class="error-msg" style="display:none"></div>

        <div class="form-group">
            <label>Email</label>
            <input type="email" id="email" placeholder="tu@email.com"/>
        </div>
        <div class="form-group">
            <label>Contraseña</label>
            <input type="password" id="password" placeholder="Tu contraseña"/>
        </div>

        <button class="btn-primary btn-full" onclick="login()">Entrar</button>

        <p class="form-footer">
            ¿No tienes cuenta? <a th:href="@{/registro}">Regístrate aquí</a>
        </p>
    </div>
</section>

<footer class="footer">
    <p>© 2018 Escuela de Fútbol Ciudad de Madrid · La Elipa, Madrid</p>
</footer>

<script src="/js/login.js"></script>
</body>
</html>
